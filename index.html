<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="4.39">
    <title>Hannah & Aurelius Wedding</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Autour+One&family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;600;900&family=Pinyon+Script&display=swap');
        
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .font-script { font-family: 'Pinyon Script', cursive; }
        .font-logo { font-family: 'Autour One', system-ui; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        
        body::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            overflow-x: hidden; 
            width: 100%;
            background-color: #fdf7f7;
            color: #452b2b;
        }

        .thin-hr {
            height: 1px;
            background-color: #d9c5c7;
            border: none;
            opacity: 0.6;
        }

        .edge-to-edge-container {
            width: 100vw;
            margin-left: calc(50% - 50vw);
            margin-right: calc(50% - 50vw);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .edge-to-edge-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* 3D RSVP Card Styles */
        .perspective-container {
            perspective: 2000px;
        }
        .tilt-card {
            transition: transform 0.15s ease-out;
            transform-style: preserve-3d;
            box-shadow: 0 35px 65px -15px rgba(69, 43, 43, 0.12);
        }
        .tilt-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 60%);
            pointer-events: none;
            z-index: 5;
            border-radius: inherit;
        }
        .inner-3d {
            transform: translateZ(50px);
        }
        .inner-3d-deep {
            transform: translateZ(80px);
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconAttr = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', iconAttr);
                    i.style.width = `${size}px`;
                    i.style.height = `${size}px`;
                    i.className = className;
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { 'stroke-width': strokeWidth, 'width': size, 'height': size }
                    });
                }
            }, [name, size, strokeWidth, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const ScriptLogo = ({ className = "" }) => (

                            </div>

                        <div className="thin-hr mt-10 max-w-2xl mx-auto h-[1.5px] opacity-100"></div>
                    </div>

                    <div className="w-full max-w-4xl mx-auto px-6 mb-24 md:mb-32">
                        <div className="text-center mb-16">
                            <p className="text-[10px] md:text-[11px] tracking-[0.4em] text-[#8a7373] mb-4 uppercase font-bold opacity-80">The Schedule</p>
                            <h2 className="font-serif italic text-3xl md:text-4xl text-[#452b2b]">Wedding Timeline</h2>

                        <div className="relative">
                            <div className="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-[1px] bg-[#d9c5c7] opacity-40"></div>
                            <div className="space-y-16 relative">
                                <div className="space-y-12">
                                    <div className="relative flex flex-row items-center">
                                        <div className="w-1/2 pr-6 md:pr-12 text-right">
                                            <p className="font-sans text-[11px] font-bold tracking-[0.2em] text-[#8a7373] uppercase mb-1">1:00 PM</p>
                                            <h3 className="font-serif text-lg md:text-xl text-[#452b2b] mb-1">Ceremony Starts</h3>
                                            <p className="font-serif text-[#8a7373] italic text-xs md:text-sm">True Jesus Church, Pacifica, CA</p>
                                        </div>
                                        <div className="relative z-10 flex items-center justify-center w-8 h-8 rounded-full bg-[#fdf7f7] border border-[#d9c5c7]">

                                            <CherryBlossomSVG className="w-4 h-4 text-[#e6baba]" />

                                    <div className="relative flex flex-row items-center">
                                        <div className="w-1/2"></div>
                                        <div className="relative z-10 flex items-center justify-center w-8 h-8 rounded-full bg-[#fdf7f7] border border-[#d9c5c7]">
                                            <CherryBlossomSVG className="w-4 h-4 text-[#e6baba]" />
                                        </div>
                                        <div className="w-1/2 pl-6 md:pl-12 text-left">

                    </div>

                    <div className="w-full max-w-2xl mx-auto px-6 mb-32 relative">

        };

        const RSVP = () => {
            const cardRef = useRef(null);

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const card = cardRef.current;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (centerY - y) / 10; 
                const rotateY = (x - centerX) / 10;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            };

            const handleMouseLeave = () => {
                if (!cardRef.current) return;
                cardRef.current.style.transform = `rotateX(0deg) rotateY(0deg)`;
            };

            const handleTouchMove = (e) => {
                if (!cardRef.current || !e.touches[0]) return;
                const card = cardRef.current;
                const rect = card.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                const y = e.touches[0].clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (centerY - y) / 15;
                const rotateY = (x - centerX) / 15;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            };

            return (
                <div className="animate-fade-in pt-12 pb-24 px-6">
                    <div className="perspective-container flex justify-center">
                        <div 
                            ref={cardRef}
                            onMouseMove={handleMouseMove}
                            onMouseLeave={handleMouseLeave}
                            onTouchMove={handleTouchMove}
                            onTouchEnd={handleMouseLeave}
                            className="tilt-card relative w-full max-w-lg bg-white p-12 md:p-20 rounded-[3rem] border border-[#d9c5c7]/40 backdrop-blur-sm cursor-default"
                        >

                                </div>
                                
                                {/* Header Section */}

                                    <h2 className="font-serif italic text-4xl md:text-6xl text-[#452b2b] tracking-tight">RSVP</h2>
                                </div>

                                {/* Body Text */}

                                        We are excited to share the joy with you!
                                    </p>

                                </div>

                                        By April 15, 2026
                                    </p>
                                </div>
                                
                                {/* CTA Button */}
                                <a 
                                    href="https://withjoy.com/hannah-aury/rsvp"

                                >

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const OurStory = () => (
            <div className="max-w-3xl mx-auto animate-fade-in pb-20 px-4">
                <div className="text-center mb-20"><h2 className="font-serif text-5xl text-[#452b2b] mb-4 tracking-tight italic">Our Story</h2></div>
                <div className="space-y-24">

                                <span className="text-xs tracking-[0.3em] text-[#8a7373] font-bold uppercase">Chronicle</span>
                                <h3 className="font-serif text-3xl text-[#452b2b] mt-4 mb-6">{title}</h3>
                                <p className="font-serif text-[#8a7373] leading-relaxed italic text-lg">A beautiful journey that brought us here today.</p>
                            </div>

        const QA = () => (

                <div className="text-center mb-16">
                    <p className="text-xs tracking-[0.3em] text-[#8a7373] mb-4 uppercase font-bold">Frequently Asked</p>
                    <h2 className="font-serif italic text-4xl md:text-5xl text-[#452b2b] mb-12 italic">Q & A</h2>
                </div>
                <div className="space-y-8">
                    {[
                        { q: "Dress Code", a: "Formal attire. Please avoid wearing white." },
                        { q: "Children", a: "Adults-only ceremony and reception." },
                        { q: "Parking", a: "Complimentary parking available on-site." }
                    ].map((item, i) => (
                        <div key={i} className="bg-white/60 p-8 rounded-2xl border border-[#eee0e0] group hover:border-[#d9c5c7] transition-all duration-300">
                            <h3 className="font-sans font-bold text-[#452b2b] mb-4 uppercase tracking-widest text-[10px] md:text-xs">{item.q}</h3>
                            <p className="font-serif text-[#8a7373] italic leading-relaxed text-base md:text-lg">{item.a}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Registry = () => (
            <div className="max-w-3xl mx-auto animate-fade-in text-center pb-20 px-4">
                <h2 className="font-serif text-5xl text-[#452b2b] mb-4 italic">Registry</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
                    <div className="p-12 bg-white rounded-2xl border border-[#eee0e0]">
                        <Icon name="Gift" size={48} className="text-[#e6baba] mx-auto mb-6" strokeWidth={1} />
                        <h3 className="font-sans font-bold text-xl text-[#452b2b] uppercase tracking-widest">Honeymoon Fund</h3>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('Home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const navLinks = ['Home', 'RSVP', 'Our Story', 'Q&A', 'Registry'];

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 100);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleNavigate = (tab) => {
                setActiveTab(tab);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-[#fdf7f7] font-sans relative">
                    <ScatteredBlossoms />
                    <header className={`fixed top-0 left-0 right-0 h-20 z-[100] px-6 md:px-12 flex items-center transition-all duration-700 ${scrolled ? 'bg-[#fdf7f7]/95 backdrop-blur-xl translate-y-0 border-b border-[#f0e6e6]' : 'bg-transparent -translate-y-2'}`}>
                        <div className="max-w-7xl mx-auto w-full flex items-center justify-between">
                            <button onClick={() => setIsMenuOpen(true)} className="flex items-center gap-3 group outline-none">
                                <div className="flex flex-col gap-1 w-6 items-end">
                                    <div className="h-[1.5px] w-full bg-[#452b2b] transition-all group-hover:bg-[#d9c5c7]"></div>
                                    <div className="h-[1.5px] w-4 bg-[#452b2b] transition-all group-hover:w-full group-hover:bg-[#d9c5c7]"></div>
                                </div>
                                <span className="text-[10px] font-black tracking-[0.3em] uppercase text-[#452b2b] hidden md:block group-hover:text-[#d9c5c7] transition-colors">Menu</span>
                            </button>
                            <button onClick={() => handleNavigate('Home')} className="flex items-center justify-center group outline-none"><ScriptLogo /></button>
                            <button onClick={() => handleNavigate('RSVP')} className="relative overflow-hidden group px-8 pt-[9px] pb-[11px] border border-[#452b2b] rounded-full hidden md:flex items-center justify-center h-10 min-w-[110px]">
                                <span className="relative z-10 text-[10px] font-black tracking-[0.3em] text-[#452b2b] uppercase group-hover:text-white transition-colors duration-500">RSVP</span>
                                <div className="absolute inset-0 bg-[#452b2b] translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out z-0"></div>
                            </button>
                            <button onClick={() => handleNavigate('RSVP')} className="md:hidden text-[10px] font-black tracking-[0.3em] text-[#452b2b] uppercase border-b-2 border-[#d9c5c7]">RSVP</button>
                        </div>
                    </header>

                    <div className={`fixed inset-0 z-[110] transition-transform duration-700 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="absolute inset-0 bg-[#452b2b]/20 backdrop-blur-md" onClick={() => setIsMenuOpen(false)} />
                        <div className="absolute top-0 left-0 bottom-0 w-full md:w-[450px] bg-[#fdf7f7] p-12 flex flex-col border-r border-[#f0e6e6] shadow-2xl">
                            <div className="flex justify-end items-center mb-24">
                                <button onClick={() => setIsMenuOpen(false)} className="text-[#8a7373] hover:rotate-90 transition-transform"><Icon name="X" size={32} strokeWidth={1} /></button>
                            </div>
                            <nav className="flex flex-col gap-10">
                                {navLinks.map((link) => (
                                    <button key={link} onClick={() => {handleNavigate(link); setIsMenuOpen(false);}} className="group text-left">
                                        <div className="flex items-baseline gap-4">
                                            <span className="text-[10px] font-black text-[#d9c5c7] tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">0{navLinks.indexOf(link) + 1}</span>
                                            <span className={`font-serif text-5xl transition-all duration-500 ${activeTab === link ? 'text-[#452b2b] italic' : 'text-[#8a7373] hover:text-[#452b2b] hover:pl-4'}`}>{link}</span>
                                        </div>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>

                    <div className="h-16" />
                    <nav className="pt-8 pb-8 px-4 sticky top-0 bg-[#fdf7f7]/95 backdrop-blur-sm z-50 border-b border-[#f0e6e6]/50">
                        <div className="max-w-4xl mx-auto flex justify-center">
                            <ul className="inline-flex items-center justify-center p-1 bg-white/40 rounded-full border border-[#d9c5c7]/30 shadow-sm overflow-hidden">
                                {navLinks.map((link) => (
                                    <li key={link} className="relative rounded-full">
                                        <button 
                                            onClick={() => handleNavigate(link)} 
                                            className={`relative z-10 px-4 md:px-7 py-2 text-[9px] md:text-[10px] font-bold tracking-[0.25em] uppercase transition-all duration-300 rounded-full ${activeTab === link ? 'text-[#fdf7f7]' : 'text-[#8a7373] hover:text-[#452b2b]'}`}
                                        >
                                            {link}
                                        </button>
                                        {activeTab === link && (
                                            <div className="absolute inset-0 bg-[#452b2b] rounded-full z-0" />
                                        )}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto pt-4 md:pt-8 relative z-10 px-6">
                        {activeTab === 'Home' && <Home onNavigate={handleNavigate} />}
                        {activeTab === 'RSVP' && <RSVP />}
                        {activeTab === 'Our Story' && <OurStory />}
                        {activeTab === 'Q&A' && <QA />}
                        {activeTab === 'Registry' && <Registry />}
                    </main>

                    <footer className="mt-40 text-center pb-20 relative z-10">
                        <ExactFloralEmblem className="w-16 h-16 opacity-60 mx-auto mb-6 text-[#d9c5c7]" />
                        <ScriptLogo className="mx-auto scale-125" />
                        <p className="font-serif text-base text-[#8a7373] italic tracking-[0.4em] mt-8 uppercase">06.28.2026</p>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
