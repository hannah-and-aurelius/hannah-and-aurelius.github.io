<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hannah & Aurelius Wedding</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hannah-and-aurelius.github.io/">
    <meta property="og:title" content="Hannah & Aurelius Wedding">
    <meta property="og:description" content="We're getting married! Join us on June 28, 2026.">
    <meta property="og:image" content="https://hannah-and-aurelius.github.io/inviteartworkcropped.jpg">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:image" content="https://hannah-and-aurelius.github.io/inviteartworkcropped.jpg">
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Autour+One&family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;600;900&family=Pinyon+Script&display=swap');
        
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .font-script { font-family: 'Pinyon Script', cursive; }
        .font-logo { font-family: 'Autour One', system-ui; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        
        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-pulse-text { animation: pulse-text 2s ease-in-out infinite; }

        @keyframes audio-bar {
            0%, 100% { height: 2px; }
            50% { height: 6px; }
        }
        .audio-anim-1 { animation: audio-bar 0.6s infinite 0.1s; }
        .audio-anim-2 { animation: audio-bar 0.8s infinite 0.2s; }
        .audio-anim-3 { animation: audio-bar 0.7s infinite 0.3s; }

        @keyframes fall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(115vh) translateX(50px) rotate(450deg); opacity: 0; }
        }

        .falling-blossom {
            position: fixed;
            top: -120px; 
            pointer-events: none;
            will-change: transform, opacity;
            z-index: 80;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #fdf7f7;
            color: #452b2b;
            overflow-x: hidden; /* Added to prevent horizontal scroll */
        }

        body.is-locked {
            overflow: hidden !important;
            height: 100vh !important;
            position: fixed !important;
            width: 100% !important;
        }

        body.is-unlocked {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            height: auto !important;
            position: relative !important;
        }

        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        #persistent-music-toggle {
            position: fixed !important;
            bottom: 24px !important;
            left: 24px !important;
            z-index: 9999 !important;
            display: none; 
        }

        .thin-hr {
            height: 1px;
            background-color: #d9c5c7;
            border: none;
            opacity: 0.6;
        }

        .full-window-image-container {
            width: 100%;
            overflow: hidden;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .full-window-image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .paper-texture {
            background-color: #fdfaf5;
            background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            box-shadow: 
                0 10px 30px -10px rgba(0,0,0,0.1),
                0 4px 6px -2px rgba(0,0,0,0.05),
                inset 0 0 100px rgba(255,255,255,0.5);
        }

        .wax-seal {
            background: radial-gradient(circle at 30% 30%, #e6baba, #d49999);
            box-shadow: 
                2px 4px 8px rgba(0,0,0,0.2),
                inset -2px -2px 4px rgba(0,0,0,0.1),
                inset 2px 2px 4px rgba(255,255,255,0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wax-seal:hover {
            transform: scale(1.05) rotate(5deg);
            filter: brightness(1.05);
        }
    </style>
</head>
<body class="is-locked">
    <div id="root"></div>

    <div id="persistent-music-toggle">
        <button id="music-btn" class="w-8 h-8 rounded-full bg-white/95 backdrop-blur-md border border-[#d9c5c7]/60 flex items-center justify-center shadow-[0_8px_30px_rgb(0,0,0,0.15)] hover:bg-white hover:scale-110 active:scale-95 transition-all duration-300">
            <div class="flex items-center gap-[2px] h-2">
                <div id="bar-1" class="w-[1.5px] bg-[#452b2b] rounded-full h-[2px] self-center"></div>
                <div id="bar-2" class="w-[1.5px] bg-[#452b2b] rounded-full h-[2px] self-center"></div>
                <div id="bar-3" class="w-[1.5px] bg-[#452b2b] rounded-full h-[2px] self-center"></div>
            </div>
        </button>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconAttr = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', iconAttr);
                    i.style.width = `${size}px`;
                    i.style.height = `${size}px`;
                    i.className = className;
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { 'stroke-width': strokeWidth, 'width': size, 'height': size }
                    });
                }
            }, [name, size, strokeWidth, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const ScriptLogo = ({ className = "", color = "#452b2b" }) => (
            <div className={`flex items-center justify-center ${className}`}>
                <div className="flex items-center gap-1.5">
                    <span className="font-serif text-lg md:text-xl font-medium leading-none" style={{ color: color }}>H</span>
                    <span className="font-logo text-lg md:text-xl leading-none" style={{ color: color === "#452b2b" ? '#e6baba' : color }}>&</span>
                    <span className="font-serif text-lg md:text-xl font-medium leading-none" style={{ color: color }}>A</span>
                </div>
            </div>
        );

        const ExactFloralEmblem = ({ className = "" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 42C50 25 35 15 25 25C15 35 25 50 42 50" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                <path d="M58 50C75 50 85 35 75 25C65 15 50 25 50 42" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                <path d="M50 58C50 75 65 85 75 75C85 65 75 50 58 50" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                <path d="M42 50C25 50 15 65 25 75C35 85 50 75 50 58" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                <circle cx="50" cy="50" r="5" stroke="currentColor" strokeWidth="2"/>
            </svg>
        );

        const CherryBlossomSVG = ({ className = "" }) => (
            <div className={`relative ${className}`}>
                {[0, 72, 144, 216, 288].map((deg) => (
                    <div key={deg} className="absolute inset-0 origin-center" style={{ transform: `rotate(${deg}deg) translateY(-25%)` }}>
                        <svg width="100%" height="100%" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 22 C 16 16, 18 8, 14 4 C 13 5.5, 11 5.5, 10 4 C 6 8, 8 16, 12 22 Z" />
                        </svg>
                    </div>
                ))}
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[15%] h-[15%] rounded-full bg-[#d49999]/40" />
            </div>
        );

        const SinglePetalSVG = ({ className = "" }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M12 22 C 18 16, 20 6, 15 2 C 13.5 4, 10.5 4, 9 2 C 4 6, 6 16, 12 22 Z" />
            </svg>
        );

        const FallingBlossoms = () => {
            const blossoms = useMemo(() => {
                return Array.from({ length: 25 }).map((_, i) => {
                    const duration = 7 + Math.random() * 8;
                    const delay = i < 6 ? 0 : Math.random() * 12; 
                    return {
                        id: i,
                        left: `${Math.random() * 95}%`, // Slightly inward from edge
                        delay: `${delay}s`,
                        duration: `${duration}s`,
                        size: 10 + Math.random() * 14,
                        opacity: 0.3 + Math.random() * 0.4,
                        isFlower: Math.random() > 0.75
                    };
                });
            }, []);

            return (
                <div className="fixed inset-0 pointer-events-none z-[80] overflow-hidden w-full max-w-full">
                    {blossoms.map((b) => (
                        <div
                            key={b.id}
                            className="falling-blossom"
                            style={{
                                left: b.left,
                                animation: `fall ${b.duration} linear infinite`,
                                animationDelay: b.delay,
                                width: `${b.size}px`,
                                height: `${b.size}px`,
                                color: '#e6baba'
                            }}
                        >
                            <div style={{ opacity: b.opacity }} className="w-full h-full">
                                {b.isFlower ? (
                                    <CherryBlossomSVG className="w-full h-full" />
                                ) : (
                                    <SinglePetalSVG className="w-full h-full" />
                                )}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const ScatteredBlossoms = () => {
            const items = [
                { top: '8%', left: '5%', rot: 45, scale: 1, type: 'flower', opacity: 0.6 },
                { top: '15%', left: '85%', rot: -15, scale: 0.8, type: 'petal', opacity: 0.8 },
                { top: '35%', left: '8%', rot: 75, scale: 0.6, type: 'petal', opacity: 0.5 },
                { top: '45%', left: '88%', rot: 20, scale: 1.2, type: 'flower', opacity: 0.4 },
                { top: '65%', left: '12%', rot: -45, scale: 0.9, type: 'petal', opacity: 0.7 },
                { top: '80%', left: '85%', rot: -30, scale: 0.8, type: 'flower', opacity: 0.5 },
                { top: '95%', left: '50%', rot: 15, scale: 1.1, type: 'flower', opacity: 0.3 },
            ];
            return (
                <div className="absolute inset-0 pointer-events-none z-0 overflow-hidden min-h-full w-full">
                    {items.map((item, i) => (
                        <div key={i} className="absolute text-[#e6baba]" style={{ top: item.top, left: item.left, transform: `rotate(${item.rot}deg) scale(${item.scale})`, opacity: item.opacity }}>
                            {item.type === 'flower' ? <CherryBlossomSVG className="w-12 h-12 -mt-6 -ml-6" /> : <SinglePetalSVG className="w-6 h-6" />}
                        </div>
                    ))}
                </div>
            );
        };

        const EntryScreen = ({ onOpen }) => {
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center bg-[#fdf7f7] px-6 overflow-hidden w-full">
                    <div className="relative group max-w-sm w-full animate-fade-in">
                        <div className="absolute inset-0 blur-2xl bg-black/5 -bottom-4 -right-4 rounded-xl"></div>
                        <div 
                          className="paper-texture relative aspect-[3/4] rounded-xl flex flex-col items-center justify-center p-8 border border-white/50 cursor-pointer"
                          onClick={onOpen}
                        >
                            <div className="absolute inset-4 border border-[#d9c5c7]/30 rounded-lg pointer-events-none"></div>
                            <div className="mb-8 opacity-60">
                                <ExactFloralEmblem className="w-12 h-12 text-[#d9c5c7]" />
                            </div>
                            <p className="font-sans text-[10px] tracking-[0.4em] uppercase text-[#8a7373] mb-6 font-bold">You're Invited To</p>
                            <div className="flex flex-col items-center mb-12">
                                <span className="font-serif italic text-3xl text-[#452b2b]">The Wedding of</span>
                                <div className="h-px w-8 bg-[#d9c5c7] my-4 opacity-50"></div>
                                <div className="flex items-center gap-3">
                                    <span className="font-script text-4xl text-[#452b2b]">Hannah</span>
                                    <span className="font-script text-2xl" style={{ color: '#e6baba' }}>&</span>
                                    <span className="font-script text-4xl text-[#452b2b]">Aurelius</span>
                                </div>
                            </div>
                            <div className="relative flex flex-col items-center group/seal">
                                <div className="wax-seal w-20 h-20 rounded-full flex items-center justify-center relative z-10">
                                    <div className="w-14 h-14 rounded-full border border-white/20 flex items-center justify-center bg-[#e6baba]/20">
                                        <ScriptLogo className="scale-75" color="#e6baba" />
                                    </div>
                                </div>
                                <div className="mt-8 text-center animate-pulse-text">
                                    <p className="font-sans text-[10px] tracking-[0.3em] uppercase text-[#452b2b] font-bold">Tap to Open</p>
                                    <div className="mt-2 h-[1.5px] w-12 bg-[#e6baba] mx-auto opacity-60"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Home = ({ onNavigate }) => (
            <div className="flex flex-col items-center animate-fade-in w-full overflow-hidden">
                <div className="mb-10 md:mb-14 px-6 flex flex-col items-center mt-2 md:mt-4 text-center w-full relative z-30">
                    <Icon name="Flower" size={24} className="text-[#d9c5c7] mb-4" strokeWidth={1} />
                    <p className="text-[10px] md:text-[11px] tracking-[0.55em] text-[#8a7373] mb-6 uppercase font-semibold opacity-80">The Wedding Of</p>
                    <div className="flex flex-col md:flex-row items-center gap-1 md:gap-4 mb-2">
                        <h1 className="text-5xl md:text-7xl font-serif italic text-[#452b2b] tracking-tight">Hannah</h1>
                        <span className="text-4xl md:text-5xl my-1 md:my-0 font-script leading-none" style={{ color: '#e6baba' }}>&</span>
                        <h1 className="text-5xl md:text-7xl font-serif italic text-[#452b2b] tracking-tight">Aurelius</h1>
                    </div>
                    <div className="mt-8 flex flex-col items-center w-full">
                        <div className="flex items-center justify-center w-full max-w-lg relative">
                            <span className="hidden md:block h-[1px] flex-1 bg-[#d9c5c7]/30"></span>
                            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] items-center gap-3 md:gap-0 px-6">
                                <div className="md:pr-8 md:text-right text-center">
                                    <p className="font-sans text-[11px] md:text-[13px] tracking-[0.45em] uppercase text-[#452b2b] font-bold whitespace-nowrap drop-shadow-sm">June 28, 2026</p>
                                </div>
                                <div className="h-4 w-[1px] bg-[#d9c5c7] hidden md:block mx-auto"></div>
                                <div className="md:pl-8 md:text-left text-center">
                                    <p className="font-sans text-[11px] md:text-[13px] tracking-[0.45em] uppercase text-[#8a7373] font-semibold whitespace-nowrap drop-shadow-sm">Pacifica, CA</p>
                                </div>
                            </div>
                            <span className="hidden md:block h-[1px] flex-1 bg-[#d9c5c7]/30"></span>
                        </div>
                    </div>
                </div>
                
                <div className="full-window-image-container mb-16 md:mb-20 -mt-48 md:-mt-80 lg:-mt-96 relative z-10">
                    <img src="inviteartworkcropped.jpg" alt="Cherry Blossoms" className="grayscale-[15%] contrast-[1.05] opacity-90 md:opacity-100" />
                </div>

                <div className="w-full max-w-4xl mx-auto px-6 mb-16 md:mb-20 text-center overflow-hidden">
                    <div className="flex justify-center mb-8">
                        <span className="text-[#d9c5c7] text-2xl">✿</span>
                    </div>
                    <h2 className="font-serif italic text-2xl md:text-4xl text-[#452b2b] mb-6 tracking-tight opacity-90">Wedding Invitation</h2>
                    <div className="font-serif text-[#8a7373] text-base md:text-lg mb-12 max-w-lg mx-auto leading-relaxed italic">
                        <p className="mb-4 text-[#452b2b] not-italic font-medium uppercase tracking-[0.2em] text-xs md:text-sm">Hannah & Aurelius</p>
                        <p className="mb-4">To our dearest friends and family, we would be honored to have you be a part of our special day.</p>
                        <p>We formally invite you to our wedding!</p>
                    </div>
                    <div className="thin-hr mb-10 max-w-2xl mx-auto h-[1.5px] opacity-100"></div>
                    <div className="flex flex-row items-center justify-center max-w-2xl mx-auto w-full">
                        <div className="flex-1 text-center px-2">
                            <p className="text-[9px] md:text-[11px] tracking-[0.3em] md:tracking-[0.4em] text-[#8a7373] uppercase mb-2 font-bold">When</p>
                            <p className="font-serif text-sm md:text-xl text-[#452b2b] tracking-wide font-medium">Sunday, June 28th</p>
                        </div>
                        <div className="block w-[1px] h-8 md:h-10 bg-[#d9c5c7]"></div>
                        <div className="flex-1 text-center px-2">
                            <p className="text-[9px] md:text-[11px] tracking-[0.3em] md:tracking-[0.4em] text-[#8a7373] uppercase mb-2 font-bold">Where</p>
                            <p className="font-serif text-sm md:text-xl text-[#452b2b] tracking-wide font-medium">Pacifica, CA</p>
                        </div>
                    </div>
                    <div className="thin-hr mt-10 max-w-2xl mx-auto h-[1.5px] opacity-100"></div>
                </div>

                <div className="w-full max-w-4xl mx-auto px-6 mb-24 md:mb-32 overflow-hidden">
                    <div className="text-center mb-16">
                        <p className="text-xs tracking-[0.4em] text-[#8a7373] mb-4 uppercase font-bold opacity-80">The Schedule</p>
                        <h2 className="font-serif italic text-3xl md:text-4xl text-[#452b2b]">Wedding Timeline</h2>
                    </div>
                    <div className="relative">
                        <div className="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-[1px] bg-[#d9c5c7] opacity-40"></div>
                        <div className="space-y-16 relative">
                            <div className="space-y-12">
                                <div className="relative flex flex-row items-center">
                                    <div className="w-1/2 pr-6 md:pr-12 text-right">
                                        <p className="font-sans text-[11px] font-bold tracking-[0.2em] text-[#8a7373] uppercase mb-1">1:00 PM</p>
                                        <h3 className="font-serif text-lg md:text-xl text-[#452b2b] mb-1">Ceremony Starts</h3>
                                        <p className="font-serif text-[#8a7373] italic text-xs md:text-sm">True Jesus Church, Pacifica, CA</p>
                                    </div>
                                    <div className="relative z-10 flex items-center justify-center w-8 h-8 rounded-full bg-[#fdf7f7] border border-[#d9c5c7]">
                                        <div className="w-2 h-2 rounded-full bg-[#e6baba]"></div>
                                    </div>
                                    <div className="w-1/2"></div>
                                </div>
                                <div className="relative flex flex-row items-center">
                                    <div className="w-1/2"></div>
                                    <div className="relative z-10 flex items-center justify-center w-8 h-8 rounded-full bg-[#fdf7f7] border border-[#d9c5c7]">
                                        <div className="w-2 h-2 rounded-full bg-[#e6baba]"></div>
                                    </div>
                                    <div className="w-1/2 pl-6 md:pl-12 text-left">
                                        <p className="font-sans text-[11px] font-bold tracking-[0.2em] text-[#8a7373] uppercase mb-1">2:00 PM</p>
                                        <h3 className="font-serif text-lg md:text-xl text-[#452b2b] mb-1">Afternoon Tea</h3>
                                        <p className="font-serif text-[#8a7373] italic text-xs md:text-sm">True Jesus Church, Pacifica, CA</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex justify-center py-4">
                                <div className="bg-[#fdf7f7] px-4">
                                    <span className="text-[#d9c5c7] text-lg">❀</span>
                                </div>
                            </div>
                            <div className="space-y-12">
                                <div className="relative flex flex-row items-center">
                                    <div className="w-1/2 pr-6 md:pr-12 text-right">
                                        <p className="font-sans text-[11px] font-bold tracking-[0.2em] text-[#8a7373] uppercase mb-1">5:00 PM</p>
                                        <h3 className="font-serif text-lg md:text-xl text-[#452b2b] mb-1">Cocktail Hour</h3>
                                        <p className="font-serif text-[#8a7373] italic text-xs md:text-sm">Hakone Gardens, Saratoga, CA</p>
                                    </div>
                                    <div className="relative z-10 flex items-center justify-center w-8 h-8 rounded-full bg-[#fdf7f7] border border-[#d9c5c7]">
                                        <div className="w-2 h-2 rounded-full bg-[#e6baba]"></div>
                                    </div>
                                    <div className="w-1/2"></div>
                                </div>
                                <div className="relative flex flex-row items-center">
                                    <div className="w-1/2"></div>
                                    <div className="relative z-10 flex items-center justify-center w-8 h-8 rounded-full bg-[#fdf7f7] border border-[#d9c5c7]">
                                        <div className="w-2 h-2 rounded-full bg-[#e6baba]"></div>
                                    </div>
                                    <div className="w-1/2 pl-6 md:pl-12 text-left">
                                        <p className="font-sans text-[11px] font-bold tracking-[0.2em] text-[#8a7373] uppercase mb-1">6:00 PM</p>
                                        <h3 className="font-serif text-lg md:text-xl text-[#452b2b] mb-1">Dinner Starts</h3>
                                        <p className="font-serif text-[#8a7373] italic text-xs md:text-sm">Hakone Gardens, Saratoga, CA</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div className="w-full max-w-2xl mx-auto px-6 mb-32 relative overflow-hidden">
                    <div className="bg-white/40 border border-[#d9c5c7]/40 p-8 md:p-14 rounded-3xl backdrop-blur-sm text-center shadow-sm">
                        <div className="mb-8 inline-flex items-center justify-center">
                            <div className="h-[1px] w-8 bg-[#d9c5c7]"></div>
                            <span className="mx-4 text-[#d9c5c7] text-xl">✧</span>
                            <div className="h-[1px] w-8 bg-[#d9c5c7]"></div>
                        </div>

                    <a href="https://withjoy.com/hannah-aurelius/rsvp" target="_blank" rel="noopener noreferrer" className="inline-block w-full max-w-[280px] md:max-w-none py-5 bg-[#452b2b] text-[#fdf7f7] font-bold tracking-[0.3em] uppercase rounded-full hover:bg-[#5a3b3b] transition-all duration-500 transform hover:-translate-y-1 text-[10px] md:text-xs">RSVP HERE</a>

                    {[

                        },
                        {

                            title: "A New Chapter", 
                            text: "After three months of continued conversations, Aurelius decided to ask Hannah to officially start their journey together as a couple.", 
                            icon: "Sparkles",
                            image: "firstmeetletsgo.png"
                        },
                        { 
                            date: "September 2024", 
                            title: "The First Visit", 
                            text: "Aurelius made his first official trip to San Francisco to visit Hannah and to meet her family.", 
                            icon: "MapPin",
                            image: "firstvisit.jpg"
                        },
                        { 
                            date: "November 2024",

                            text: "We took long distance to the next level! We met halfway in Singapore while Aurelius was in Taiwan and Hannah was in Singapore visiting family.",

                            image: "asia.jpg"
                        },
                        {

                            title: "Southern California Winter", 
                            text: "Hannah traveled to Southern California to serve as a counselor for the Winter SSC church event, where she officially met the rest of the family afterward!", 
                            icon: "Users",
                            image: "cablecar.png"
                        },
                        {

                            title: "Our Proposal", 
                            text: "Aurelius proposed in San Francisco! We then had our engagement ceremony in Southern California with our families.",

                            image: "proposal.jpg"
                        },
                        {

                            title: "Our Wedding", 
                            text: "We are officially getting married! We are so thankful for God's guidance throughout our entire story—from our very first meeting to leading us through our relationship to where we are today. We know this journey wouldn't have been possible without Him, and we can’t wait to share the joy on our wedding day with all of you. We are so excited to see you in just a few months!", 
                            icon: "BellRing",
                            image: "wedding.JPEG"

                    ].map((story, index) => (
                        <div key={index} className="flex flex-col gap-8 md:gap-12">

                                <img 
                                    src={story.image} 
                                    alt={story.title} 
                                    className={`w-full h-full object-cover grayscale-[10%] hover:grayscale-0 transition-all duration-700 hover:scale-105 ${
                                        story.image === 'firstvisit.jpg' ? 'object-[center_85%]' : 'object-center'

                                />

                            <div className={`flex flex-row gap-6 md:gap-12 items-center ${index % 2 === 0 ? 'text-left' : 'flex-row-reverse text-right'}`}>
                                <div className="flex-1">
                                    <span className="text-[9px] md:text-xs tracking-[0.3em] text-[#8a7373] font-bold uppercase">{story.date}</span>
                                    <h3 className="font-serif text-xl md:text-3xl text-[#452b2b] mt-2 md:mt-4 mb-3 md:mb-6">{story.title}</h3>
                                    <p className="font-serif text-[#8a7373] leading-relaxed italic text-sm md:text-lg">{story.text}</p>
                                </div>
                                <div className="w-16 h-16 md:w-40 md:h-40 rounded-full bg-white border border-[#eee0e0] flex items-center justify-center overflow-hidden shrink-0">
                                    <Icon name={story.icon} size={24} className="md:w-12 md:h-12 text-[#e6baba]" strokeWidth={1} />
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const QA = () => (
            <div className="max-w-2xl mx-auto animate-fade-in pb-20 px-4 text-center overflow-hidden">
                <div className="text-center mb-16">
                    <p className="text-xs tracking-[0.3em] text-[#8a7373] mb-4 uppercase font-bold">Frequently Asked</p>
                    <h2 className="font-serif italic text-4xl md:text-5xl text-[#452b2b] mb-12 italic">Q & A</h2>
                </div>
                <div className="space-y-8">
                    {[
                        { q: "Dress Code", a: "Dress Code: Cocktail Attire\n\nWe would love to see our favorite people dressed up with us in cocktail attire! If you’d like to coordinate with our theme, we invite you to join in the celebration by wearing your favorite pastel colors." },
                        { q: "Children", a: "We have chosen to keep our dinner reception limited to adults. We appreciate your love and can’t wait to celebrate with you!" },
                        { q: "Can I bring a plus-one?", a: "All are welcome to join us for our church ceremony! However, our reception will be reserved for close friends and family by invitation only. We thank you for your understanding!" },
                        { q: "Is there parking available?", a: "Yes! Complimentary parking is available on-site, but spots at the venue are quite limited. We kindly ask that you carpool with other guests as much as possible to ensure everyone has a place to park." }
                    ].map((item, i) => (
                        <div key={i} className="bg-white/60 p-8 rounded-2xl border border-[#eee0e0] group transition-all duration-300">
                            <h3 className="font-sans font-bold text-[#452b2b] mb-4 uppercase tracking-widest text-[10px] md:text-xs">{item.q}</h3>
                            <div className="font-serif text-[#8a7373] italic leading-relaxed text-base md:text-lg whitespace-pre-line">
                                {item.a}
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Registry = () => (
            <div className="max-w-3xl mx-auto animate-fade-in text-center pb-20 px-4 mt-6 md:mt-10 overflow-hidden">
                <h2 className="font-serif text-2xl md:text-3xl text-[#452b2b] mb-4 italic">Wedding Registry</h2>
                <p className="font-serif text-[#8a7373] text-sm md:text-base mb-12 max-w-lg mx-auto italic leading-relaxed">The most important thing to us is having you there to celebrate. If you wish to give a gift, a contribution toward our future home fund would be sincerely appreciated as we begin our new life together.</p>
                <div className="max-w-sm mx-auto">
                    <a href="https://withjoy.com/hannah-aurelius/registry" target="_blank" rel="noopener noreferrer" className="block p-10 bg-white rounded-2xl border border-[#eee0e0] hover:shadow-lg transition-all duration-300">
                        <Icon name="Gift" size={32} className="text-[#e6baba] mx-auto mb-6" strokeWidth={1} />
                        <h3 className="font-sans font-bold text-base text-[#452b2b] uppercase tracking-widest">Link to Registry</h3>
                    </a>
                    <p className="mt-20 font-serif text-[#8a7373] text-xs md:text-sm italic leading-relaxed px-4">
                        We’ve set up a digital fund above, but please feel free to use whichever method you’re most comfortable with, including cash or checks.
                    </p>
                </div>
            </div>
        );

        function App() {
            const [isOpened, setIsOpened] = useState(false);
            const [activeTab, setActiveTab] = useState('Home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const audioRef = useRef(null);

            const navLinks = ['Home', 'RSVP', 'Our Story', 'Q&A', 'Registry'];

            useEffect(() => {
                const audio = new Audio('starlight.mp3');
                audio.loop = true;
                audio.volume = 0.4;
                audioRef.current = audio;

                const musicBtn = document.getElementById('music-btn');
                const bars = [
                    document.getElementById('bar-1'),
                    document.getElementById('bar-2'),
                    document.getElementById('bar-3')
                ];

                const updateUI = (playing) => {
                    bars.forEach((bar, idx) => {
                        if (playing) {
                            bar.classList.add(`audio-anim-${idx + 1}`);
                            bar.classList.remove('h-[2px]', 'self-center');
                        } else {
                            bar.classList.remove('audio-anim-1', 'audio-anim-2', 'audio-anim-3');
                            bar.classList.add('h-[2px]', 'self-center');
                        }
                    });
                };

                const handleToggle = () => {
                    if (audio.paused) {
                        audio.play().then(() => updateUI(true)).catch(console.error);
                    } else {
                        audio.pause();
                        updateUI(false);
                    }
                };

                if (musicBtn) musicBtn.addEventListener('click', handleToggle);
                
                return () => {
                    if (musicBtn) musicBtn.removeEventListener('click', handleToggle);
                    audio.pause();
                };
            }, []);

            useEffect(() => {
                if (isOpened) {
                    document.body.classList.remove('is-locked');
                    document.body.classList.add('is-unlocked');
                    document.documentElement.style.overflowX = 'hidden';
                    document.body.style.overflowX = 'hidden';
                    const musicToggle = document.getElementById('persistent-music-toggle');
                    if (musicToggle) musicToggle.style.display = 'block';
                } else {
                    document.body.classList.add('is-locked');
                    document.body.classList.remove('is-unlocked');
                }
            }, [isOpened]);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 100);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleNavigate = (tab) => {
                setActiveTab(tab);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'auto' });
            };

            const handleOpen = () => {
                setIsOpened(true);
                if (audioRef.current) {
                    audioRef.current.play()
                        .then(() => {
                            [1,2,3].forEach(i => {
                                const bar = document.getElementById(`bar-${i}`);
                                if (bar) {
                                    bar.classList.add(`audio-anim-${i}`);
                                    bar.classList.remove('h-[2px]', 'self-center');
                                }
                            });
                        })
                        .catch(() => console.warn("Autoplay blocked."));
                }
            };

            return (
                <div className="min-h-screen bg-[#fdf7f7] font-sans relative w-full overflow-x-hidden">
                    {!isOpened ? (
                        <EntryScreen onOpen={handleOpen} />
                    ) : (
                        <div className="animate-fade-in relative z-10 w-full overflow-x-hidden">
                            <FallingBlossoms />
                            <ScatteredBlossoms />
                            
                            <header className={`fixed top-0 left-0 right-0 h-20 z-[100] px-6 md:px-12 flex items-center transition-all duration-700 ${scrolled ? 'bg-[#fdf7f7]/95 backdrop-blur-xl border-b border-[#f0e6e6]' : 'bg-transparent'}`}>
                                <div className="max-w-7xl mx-auto w-full flex items-center justify-between">
                                    <button onClick={() => setIsMenuOpen(true)} className="flex items-center gap-3 group outline-none">
                                        <div className="flex flex-col gap-1 w-6 items-end">
                                            <div className="h-[1.5px] w-full bg-[#452b2b] transition-all"></div>
                                            <div className="h-[1.5px] w-4 bg-[#452b2b] transition-all group-hover:w-full"></div>
                                        </div>
                                        <span className="text-[10px] font-black tracking-[0.3em] uppercase text-[#452b2b] hidden md:block">Menu</span>
                                    </button>
                                    <button onClick={() => handleNavigate('Home')} className="flex items-center justify-center group outline-none"><ScriptLogo /></button>
                                    <button onClick={() => handleNavigate('RSVP')} className="relative overflow-hidden group px-8 py-2 border border-[#452b2b] rounded-full hidden md:flex items-center justify-center min-w-[110px]">
                                        <span className="relative z-10 text-[10px] font-black tracking-[0.3em] text-[#452b2b] uppercase group-hover:text-white transition-colors duration-500">RSVP</span>
                                        <div className="absolute inset-0 bg-[#452b2b] translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out z-0"></div>
                                    </button>
                                    <button onClick={() => handleNavigate('RSVP')} className="md:hidden text-[10px] font-black tracking-[0.3em] text-[#452b2b] uppercase border-b-2 border-[#d9c5c7]">RSVP</button>
                                </div>
                            </header>

                            <div className={`fixed inset-0 z-[110] transition-transform duration-700 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                                <div className="absolute inset-0 bg-[#452b2b]/20 backdrop-blur-md" onClick={() => setIsMenuOpen(false)} />
                                <div className="absolute top-0 left-0 bottom-0 w-full md:w-[450px] bg-[#fdf7f7] p-12 flex flex-col border-r border-[#f0e6e6] shadow-2xl">
                                    <div className="flex justify-end items-center mb-24">
                                        <button onClick={() => setIsMenuOpen(false)} className="text-[#8a7373] hover:rotate-90 transition-transform"><Icon name="X" size={32} strokeWidth={1} /></button>
                                    </div>
                                    <nav className="flex flex-col gap-10">
                                        {navLinks.map((link) => (
                                            <button key={link} onClick={() => handleNavigate(link)} className="group text-left">
                                                <div className="flex items-baseline gap-4">
                                                    <span className="text-[10px] font-black text-[#d9c5c7] tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">0{navLinks.indexOf(link) + 1}</span>
                                                    <span className={`font-serif text-5xl transition-all duration-500 ${activeTab === link ? 'text-[#452b2b] italic' : 'text-[#8a7373] hover:text-[#452b2b] hover:pl-4'}`}>{link}</span>
                                                </div>
                                            </button>
                                        ))}
                                    </nav>
                                </div>
                            </div>

                            <div className="h-20" />
                            <nav className="pt-8 pb-8 px-4 sticky top-0 bg-[#fdf7f7]/95 backdrop-blur-sm z-50 border-b border-[#f0e6e6]/50">
                                <div className="max-w-4xl mx-auto flex justify-center">
                                    <ul className="inline-flex items-center justify-center p-1 px-1.5 bg-white/40 rounded-full border border-[#d9c5c7]/30 shadow-sm">
                                        {navLinks.map((link) => (
                                            <li key={link} className="relative rounded-full">
                                                <button 
                                                    onClick={() => handleNavigate(link)} 
                                                    className={`relative z-10 px-3 md:px-7 py-2 text-[9px] md:text-[10px] font-bold tracking-[0.2em] md:tracking-[0.25em] uppercase transition-all duration-300 rounded-full min-w-[58px] md:min-w-0 ${activeTab === link ? 'text-[#fdf7f7]' : 'text-[#8a7373] hover:text-[#452b2b]'}`}
                                                >
                                                    {link}
                                                </button>
                                                {activeTab === link && <div className="absolute inset-0 bg-[#452b2b] rounded-full z-0" />}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </nav>

                            <main className="max-w-full mx-auto pt-4 md:pt-8 px-0 overflow-hidden">
                                {activeTab === 'Home' && <Home onNavigate={handleNavigate} />}
                                <div className="max-w-5xl mx-auto px-4 sm:px-6">
                                    {activeTab === 'RSVP' && <RSVP />}
                                    {activeTab === 'Our Story' && <OurStory />}
                                    {activeTab === 'Q&A' && <QA />}
                                    {activeTab === 'Registry' && <Registry />}
                                </div>
                            </main>

                            <footer className="mt-40 text-center pb-20 w-full">
                                <span className="text-[#d9c5c7] text-4xl block mb-6">✿</span>
                                <ScriptLogo className="mx-auto scale-125" />
                                <p className="font-serif text-base text-[#8a7373] italic tracking-[0.4em] mt-8 uppercase">06.28.2026</p>
                            </footer>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
